[general]
import = []

[env]
TERM = "xterm-256color"

[window]
padding = { x = 8, y = 8 }
decorations = "full"
opacity = 1.0
startup_mode = "Windowed"
dimensions = { columns = 220, lines = 50 }

[scrolling]
history = 10000

[font]
normal = { family = "Monofur Nerd Font Mono", style = "Regular" }
size = 16.0

[colors.primary]
background = "#282c34"
foreground = "#abb2bf"

[colors.normal]
black = "#282c34"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#abb2bf"

[colors.bright]
black = "#5c6370"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#ffffff"

[cursor]
style = { shape = "Block", blinking = "Off" }

[terminal.shell]
program = "powershell.exe"
args = ["-NoLogo"]

[keyboard]
bindings = [
  { key = "V", mods = "Control", action = "ReceiveChar" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
]
